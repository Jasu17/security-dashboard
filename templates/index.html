{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">Subir archivo de log</h5>
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="logfile" class="form-label">Selecciona un archivo de log</label>
                        <input class="form-control" type="file" id="logfile" name="logfile" accept=".log,.txt">
                        <div class="form-text">Formatos soportados: .log, .txt, auth.log, syslog - max. 10 MB</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Subir y analizar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
